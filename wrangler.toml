name = "pixmicat-cf"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "4fae982a30d8f623b835b46bba03e72c"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "pixmicat-db"
database_id = "6a93ae9d-b83b-4a3f-b06b-d122a56c73ff"

# R2 Storage Binding
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "pixmicat-storage"

# KV Storage for cache and config
[[kv_namespaces]]
binding = "KV"
id = "a7b78e79f9524be891f8035029d97ee4"

# Environment variables
[vars]
ENVIRONMENT = "production"
TIME_ZONE = "+8"
DEFAULT_LANGUAGE = "zh_TW"
